<!doctype html><html><head><meta charset="utf-8"><title>Sov Plug</title></head><body style="margin:0;background:#000;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh"><div style="background:#111;padding:30px;border-radius:12px;text-align:center;width:300px"><h2>Sovereignty Plug</h2><p>Live data border</p><button onclick="go('US')" style="width:100%;padding:14px;margin:6px 0;background:#dc2626;border:0;color:#fff;border-radius:8px;font-size:16px">Send to US → BLOCK</button><button onclick="go('ZA')" style="width:100%;padding:14px;margin:6px 0;background:#16a34a;border:0;color:#fff;border-radius:8px;font-size:16px">Send to ZA → ALLOW</button><div id="o" style="margin-top:20px;padding:15px;background:#222;border-radius:8px;min-height:20px">Click a button</div><script>async function go(c){o.textContent="Checking...";try{let r=await fetch("/check",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({destination_country:c})});let j=await r.json();o.textContent=j.decision;o.style.color=j.decision==="BLOCKED"?"#fca5a5":"#86efac"}catch(e){o.textContent="Error"}} </script></div></body></html>
